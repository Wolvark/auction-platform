spring.application.name=auction-platform

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/auction_db
spring.datasource.username=auction_user
spring.datasource.password=auction_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server
server.port=8080

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
# IMPORTANT: Replace this secret with a strong, randomly generated Base64-encoded key (at least 256 bits).
# Use an environment variable in production: APPLICATION_SECURITY_JWT_SECRET_KEY
application.security.jwt.secret-key=${APPLICATION_SECURITY_JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
application.security.jwt.expiration-ms=${APPLICATION_SECURITY_JWT_EXPIRATION_MS:86400000}
